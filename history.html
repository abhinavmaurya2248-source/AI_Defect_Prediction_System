<!DOCTYPE html>
<html>
<head>
<title>Prediction History</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:30px;
}

h1{
    text-align:center;
    color:#1e3a8a;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

</style>

</head>

<body>

<h1>Prediction History</h1>

<table>

<tr>
<th>ID</th>
<th>Size</th>
<th>Complexity</th>
<th>Experience</th>
<th>Prediction</th>
<th>Risk Score</th>
</tr>

{% for row in records %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}%</td>
</tr>

{% endfor %}

</table>

</body>
</html>
