<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:350px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>

<form action="/dashboard" method="get">
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<button>Login</button>
</form>

</div>

</body>
</html>
